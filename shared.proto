syntax = "proto3";

import "google/protobuf/timestamp.proto";

package shared;

option go_package = "github.com/cachalots/jito-proto;jitoproto";

message Header {
  google.protobuf.Timestamp ts = 1;
}

message SharedHeartbeat {
  uint64 count = 1;
}

message Socket {
  string ip = 1;
  int64 port = 2;
}
